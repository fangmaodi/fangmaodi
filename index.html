<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DRPY 影视流媒体播放器</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/dplayer/dist/DPlayer.min.css">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #141414;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 800px;
        }
        h2 {
            color: #e50914; /* 经典流媒体红 */
            margin-bottom: 20px;
            text-align: center;
        }
        #dplayer {
            width: 100%;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            background-color: #000;
        }
        .input-group {
            margin-top: 20px;
            display: flex;
            gap: 10px;
        }
        input[type="text"] {
            flex: 1;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #333;
            background-color: #222;
            color: #fff;
            font-size: 14px;
        }
        input[type="text"]:focus {
            outline: none;
            border-color: #e50914;
        }
        button {
            padding: 12px 24px;
            background-color: #e50914;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #b80710;
        }
        .status-box {
            margin-top: 15px;
            padding: 12px;
            background-color: #1f1f1f;
            border-left: 4px solid #007acc;
            border-radius: 4px;
            font-size: 13px;
            color: #aaa;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>DRPY 核心配套流媒体播放器</h2>
    
    <div id="dplayer"></div>

    <div class="input-group">
        <input type="text" id="video-url" placeholder="请输入 .m3u8 或 .mp4 视频源流地址..." value="https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8">
        <button onclick="changeVideo()">立即播放</button>
    </div>

    <div class="status-box" id="status-log">
        系统就绪。默认加载 HLS 测试流。可完美支持配合 DRPY 脚本解析出来的视频源。
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js/dist/hls.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dplayer/dist/DPlayer.min.js"></script>

<script>
    let dp;

    // 初始化播放器函数
    function initPlayer(url) {
        // 判断是否是 M3U8 流媒体格式
        const isM3U8 = url.includes('.m3u8');
        
        // 如果存在旧播放器，先销毁防内存泄漏
        if (dp) {
            dp.destroy();
        }

        // 实例化 DPlayer
        dp = new DPlayer({
            container: document.getElementById('dplayer'),
            autoplay: true, // 自动播放
            theme: '#e50914', // 主题色
            loop: false,
            screenshot: true, // 支持截图
            hotkey: true, // 支持快捷键（左右方向键快进退，上下音量）
            video: {
                url: url,
                type: isM3U8 ? 'customHls' : 'normal', // 如果是 m3u8 则调用自定义 HLS 解码
                customType: {
                    customHls: function (video, player) {
                        const hls = new Hls();
                        hls.loadSource(video.src);
                        hls.attachMedia(video);
                    }
                }
            }
        });

        // 监听播放事件日志
        dp.on('play', () => {
            logStatus("视频开始播放中...");
        });
        dp.on('error', () => {
            logStatus("播放失败！请检查视频源 URL 是否跨域或已失效。");
        });
    }

    // 切换视频源
    function changeVideo() {
        let url = document.getElementById('video-url').value.trim();
        if (!url) {
            alert('请输入有效的视频地址！');
            return;
        }

        /* 💡 这里可以缝合你之前的 DRPY 逻辑：
           if(url.includes('广告特征')) { 
               url = fixAdM3u8Ai(url); // 调用去广告函数
           }
        */

        logStatus("正在解析并加载新视频源...");
        initPlayer(url);
    }

    // 状态打印辅助
    function logStatus(msg) {
        document.getElementById('status-log').innerText = `[状态] ${msg} (${new Date().toLocaleTimeString()})`;
    }

    // 页面首次加载，初始化默认视频
    window.onload = function() {
        let defaultUrl = document.getElementById('video-url').value;
        initPlayer(defaultUrl);
    };
</script>

</body>
</html>
